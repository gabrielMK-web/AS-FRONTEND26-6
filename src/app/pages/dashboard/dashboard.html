<div class="dashboard">

  <!-- Cabeçalho -->
  <div class="dashboard-header">

    <h2>Painel de Controle</h2>

    <!-- Botão de logout -->
    <button class="btn-sair" (click)="fazerLogout()">
      Sair do Sistema
    </button>

  </div>

  <!-- Botão para ir para tarefas -->
  <button (click)="irParaPainelTarefas()">
    Painel de Tarefas
  </button>

  <!-- Mensagem de erro -->
  @if (mensagemErro) {
    <div class="erro">
      {{ mensagemErro }}
    </div>
  }

  <!-- Lista de usuários -->
  <ul class="lista-usuarios">

    @for (usuario of listaDeUsuarios; track usuario.id) {

      <li>
        <strong>ID:</strong> {{ usuario.id }} <br>
        <strong>E-mail:</strong> {{ usuario.email }}
      </li>

    } @empty {

      <p>Carregando usuários...</p>

    }

  </ul>

</div>
